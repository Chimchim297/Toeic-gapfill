<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TOEIC Gap Fill Pro</title>
<style>
body { font-family: Arial; max-width: 900px; margin: auto; padding: 20px; }
input { width: 200px; padding: 5px; margin: 5px; }
.correct { color: green; }
.wrong { color: red; }
.hints { margin-top: 20px; background:#f5f5f5; padding:10px; }
button { margin:10px 5px; padding:10px 15px; }
</style>
</head>

<body>

<h2 id="title"></h2>
<div id="content"></div>

<button onclick="checkAnswers()">Kiểm tra đáp án</button>
<button onclick="nextPart()">Next</button>

<script>

{

text:`I was assigned a task in Singapore that was arranged (6) <input id="q6">, leaving me very little time to prepare.

},

hints:[
["on short notice","Thông báo gấp"],
["current","Hiện tại"],
["non-stop flights","Bay thẳng"],
["connecting flights","Bay nối chuyến"],
["I'll be leaving work early","Rời sớm"],
["train platform","Sân ga"]
]
},

{
title:"PART 3",
text:`The recent (12) <input id="q12"> focused on goals. 
The event was (13) <input id="q13">. 
The market is (14) <input id="q14">. 
We must (15) <input id="q15">. 
We also need to (16) <input id="q16"> costs.`,

answers:{
q12:["meeting session"],
q13:["well-attended"],
q14:["constantly changing"],
q15:["streamline the operations with new technology"],
q16:["economize on"]
},

hints:[
["meeting session","Buổi họp"],
["well-attended","Đông người"],
["constantly changing","Liên tục đổi"],
["streamline...","Tinh gọn"],
["economize on","Tiết kiệm"]
]
},

{
title:"PART 4",
text:`We decided to (17) <input id="q17">. 
It (18) <input id="q18"> launch. 
The company showed (19) <input id="q19">. 
Donations will (20) <input id="q20"> costs.`,

answers:{
q17:["leverage social media to get donations"],
q18:["was supposed to"],
q19:["sympathy"],
q20:["make up for","compensate for"]
},

hints:[
["leverage social media","Kêu gọi"],
["was supposed to","Đáng lẽ"],
["sympathy","Đồng cảm"],
["make up for","Bù đắp"]
]
},

{

text:`The company will (21) <input id="q21"> product. 
They hired (22) <input id="q22">. 
The product was met (23) <input id="q23">. 
Experts tried to (24) <input id="q24"> buyers. 
It may be a (25) <input id="q25">.`,

answers:{
q21:["unveil"],

},

hints:[
["unveil","Ra mắt"],
["product demonstrators","Người demo"],
["eager reception","Đón nhận"],
["dissuade","Ngăn cản"],
["game changer","Thay đổi cuộc chơi"]
]
},

{
title:"PART 6",
text:`Users notice (26) <input id="q26">. 
One (27) <input id="q27"> exists. 
Users can (28) <input id="q28"> settings. 
They can (29) <input id="q29"> apps. 
Camera has (30) <input id="q30"> to detect (31) <input id="q31">. 
This brings (32) <input id="q32">.`,

answers:{
q26:["sleek design"],
q27:["drawback"],
q28:["override"],
q29:["navigate"],
q30:["feature"],
q31:["creatures"],
q32:["novelty"]
},

hints:[
["sleek design","Thiết kế đẹp"],
["drawback","Nhược điểm"],
["override","Ghi đè"],
["navigate","Điều hướng"],
["feature","Tính năng"],

]
},

{
title:"PART 7",
text:`CEO decided to (33) <input id="q33">. 
He used (34) <input id="q34">. 
He made sure to (35) <input id="q35"> details. 
Customers receive (36) <input id="q36">.`,

answers:{
q33:["act in the role"],
q34:["anecdotes"],
q35:["get correct"],
q36:["an itemized statement of fees"]
},

hints:[
["act in the role","Đóng vai"],
["anecdotes","Giai thoại"],
["get correct","Chính xác"],
["itemized statement","Bảng chi tiết"]
]
}

];

// shuffle
parts.sort(()=>Math.random()-0.5);

let current=0;
let score=0;
let total=36;

function loadPart(){
document.getElementById("title").innerText=parts[current].title;
document.getElementById("content").innerHTML=parts[current].text;

let hintHTML="<div class='hints'><b>HINTS</b><br>";
parts[current].hints.forEach(h=>{
hintHTML+=`🔊 <span onclick="speak('${h[0]}')" style="cursor:pointer">${h[1]}</span><br>`;
});
hintHTML+="</div>";

document.getElementById("content").innerHTML+=hintHTML;
document.getElementById("result").innerHTML="";
}

function norm(t){return t.toLowerCase().trim();}

function checkAnswers(){
let output="";
for(let key in parts[current].answers){
let input=document.getElementById(key).value;
let correctList=parts[current].answers[key];

let correct=correctList.some(a=>norm(a)===norm(input));

if(correct){
output+=`<div class="correct">${key}: Đúng</div>`;
score++;
}else{
output+=`<div class="wrong">${key}: Sai → ${correctList.join(" / ")}</div>`;
}
}
document.getElementById("result").innerHTML=output;
}

function nextPart(){
if(current<parts.length-1){
current++;
loadPart();
}else{
let percent=Math.round(score/total*100);
document.body.innerHTML=`<h2>KẾT QUẢ</h2>
<p>${score}/${total}</p>
<p>${percent}%</p>`;
}
}

function speak(text){
let u=new SpeechSynthesisUtterance(text);
u.lang="en-US";
speechSynthesis.speak(u);
}

loadPart();

</script>

</body>
</html>
